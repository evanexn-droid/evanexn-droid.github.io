    <main>
        <section class="hero shows-hero">
            <h2>Shows</h2>
            <p>If you wanna witness the Wormhole in a city near you , let me know a cool venue where I can come !</p>
            <form action="https://formsubmit.co/evaaanhole@gmail.com" method="POST">
                <input type="hidden" name="_subject" value="New show suggestion from Evan Wormhole site">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">
                <label for="venue">Venue:</label>
                <input type="text" id="venue" name="venue" required>
                <label for="location">Location:</label>
                <select id="location" name="location" required>
                    <option value="" disabled selected>Select a city</option>
                    <optgroup label="England">
                        <option>Bath</option>
                        <option>Birmingham</option>
                        <option>Bradford</option>

                        <option>Derby</option>
                        <option>Durham</option>
                        <option>Ely</option>
                        <option>Exeter</option>
                        <option>Gloucester</option>
                        <option>Hereford</option>
                        <option>Kingston upon Hull</option>
                        <option>Lancaster</option>
                        <option>Leeds</option>
                        <option>Leicester</option>
                        <option>Lichfield</option>
                        <option>Lincoln</option>
                        <option>Liverpool</option>
                        <option>London</option>
                        <option>Manchester</option>
                        <option>Newcastle upon Tyne</option>
                        <option>Norwich</option>
                        <option>Nottingham</option>
                        <option>Oxford</option>
                        <option>Peterborough</option>
                        <option>Plymouth</option>
                        <option>Portsmouth</option>
                        <option>Preston</option>
                        <option>Ripon</option>
                        <option>Salford</option>
                        <option>Salisbury</option>
                        <option>Sheffield</option>
                        <option>Southampton</option>
                        <option>St Albans</option>
                        <option>Stoke-on-Trent</option>
                        <option>Sunderland</option>
                        <option>Truro</option>
                        <option>Wakefield</option>
                        <option>Wells</option>
                        <option>Westminster</option>
                        <option>Winchester</option>
                        <option>Wolverhampton</option>
                        <option>Worcester</option>
                        <option>York</option>
                    </optgroup>
                    <optgroup label="Scotland">
                        <option>Aberdeen</option>
                        <option>Dundee</option>
                        <option>Edinburgh</option>
                        <option>Glasgow</option>
                        <option>Inverness</option>
                        <option>Perth</option>
                        <option>Stirling</option>
                    </optgroup>
                    <optgroup label="Wales">
                        <option>Bangor</option>
                        <option>Cardiff</option>
                        <option>Newport</option>

                        <option>Swansea</option>
                    </optgroup>
                    <optgroup label="Northern Ireland">
                        <option>Belfast</option>
                        <option>Derry / Londonderry</option>
                        <option>Lisburn</option>
                        <option>Newry</option>
                        <option>Armagh</option>
                    </optgroup>
                    <optgroup label="Ireland">
                        <option>Dublin</option>
                        <option>Cork</option>
                        <option>Galway</option>
                        <option>Limerick</option>
                        <option>Waterford</option>
                    </optgroup>
                    <optgroup label="Other">
                        <option>Rest Of The World</option>
                    </optgroup>
                </select>
                <button type="submit">Submit Suggestion</button>
            </form>
        </section>
