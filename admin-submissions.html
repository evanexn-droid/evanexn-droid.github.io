<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Submissions</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 2rem; }
        .hidden { display: none; }
        .submission-card { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; border-radius: 0.5rem; }
        .submission-card h4 { margin: 0 0 0.5rem; }
        .submission-card img { max-width: 100%; height: auto; display: block; margin-top: 0.5rem; }
        .admin-actions { margin-bottom: 1rem; }
        .submission-section { border: 1px solid #ddd; border-radius: 0.5rem; margin-bottom: 1rem; overflow: hidden; background: rgba(255,255,255,0.8); }
        .submission-section summary { cursor: pointer; padding: 1rem; font-weight: 600; list-style: none; }
        .submission-section summary::-webkit-details-marker { display: none; }
        .submission-section-content { padding: 0 1rem 1rem; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-button" aria-label="Home">
            <img src="logo.png" alt="Evan Wormhole Logo" class="logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="music.html">Music</a></li>
                <li><a href="shows.html">Shows</a></li>
                <li><a href="updates.html">Updates</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero shows-hero">
            <h2>Admin Submissions</h2>
            <p>This page is password-protected and displays saved merch, show, and sticker queue submissions.</p>
            <div id="login-panel" class="admin-actions">
                <label for="admin-password">Admin Password:</label>
                <input id="admin-password" type="password" placeholder="Enter password">
                <button id="admin-login" type="button">Unlock</button>
                <p id="login-error" style="color:red; display:none;">Invalid password.</p>
            </div>
            <div id="submissions-panel" class="hidden">
                <button id="clear-submissions" type="button">Clear All Saved Submissions</button>
                <div id="submissions-list"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Evan Wormhole. All rights reserved.</p>
    </footer>

    <script>
        const LOGIN_HASH = '7bea9e8534528ebe9d3db1a8bbf1231bb8c62749f4ade80d8d22a4712af126c9';
        const loginPanel = document.getElementById('login-panel');
        const submissionsPanel = document.getElementById('submissions-panel');
        const loginError = document.getElementById('login-error');
        const passwordInput = document.getElementById('admin-password');
        const loginButton = document.getElementById('admin-login');
        const submissionsList = document.getElementById('submissions-list');
        const clearButton = document.getElementById('clear-submissions');

        async function hashText(text) {
            const data = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(byte => byte.toString(16).padStart(2, '0')).join('');
        }

        function renderSubmissions(items) {
            submissionsList.innerHTML = '';
            if (!items.length) {
                submissionsList.innerHTML = '<p>No saved submissions yet.</p>';
                return;
            }

            const groupedItems = {
                merch: items.filter(item => item.type === 'merch'),
                sticker: items.filter(item => item.type === 'sticker'),
                show: items.filter(item => item.type !== 'merch' && item.type !== 'sticker')
            };

            const sections = [
                { key: 'merch', title: 'Merch Design Submissions', items: groupedItems.merch },
                { key: 'sticker', title: 'Sticker Queue Submissions', items: groupedItems.sticker },
                { key: 'show', title: 'Show Suggestions', items: groupedItems.show }
            ];

            sections.forEach(section => {
                const details = document.createElement('details');
                details.className = 'submission-section';
                details.open = section.items.length > 0;

                const summary = document.createElement('summary');
                summary.textContent = `${section.title} (${section.items.length})`;
                details.appendChild(summary);

                const content = document.createElement('div');
                content.className = 'submission-section-content';

                if (!section.items.length) {
                    const emptyState = document.createElement('p');
                    emptyState.textContent = 'No submissions in this category yet.';
                    content.appendChild(emptyState);
                } else {
                    section.items.slice().reverse().forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'submission-card';

                        const title = document.createElement('h4');
                        title.textContent = item.type === 'merch'
                            ? 'Merch Design Submission'
                            : item.type === 'sticker'
                                ? 'Sticker Queue Submission'
                                : 'Show Suggestion';
                        card.appendChild(title);

                        const meta = document.createElement('p');
                        meta.textContent = `Submitted: ${new Date(item.timestamp).toLocaleString()}`;
                        card.appendChild(meta);

                        if (item.type === 'merch') {
                            card.appendChild(document.createElement('p')).textContent = `Tool: ${item.tool}`;
                            card.appendChild(document.createElement('p')).textContent = `Brush Size: ${item.brushSize}`;
                            card.appendChild(document.createElement('p')).textContent = `Brush Color: ${item.brushColor}`;
                            if (item.message) {
                                card.appendChild(document.createElement('p')).textContent = `Message: ${item.message}`;
                            }
                            const img = document.createElement('img');
                            img.src = item.drawingData;
                            img.alt = 'Saved merch drawing';
                            card.appendChild(img);
                        } else if (item.type === 'sticker') {
                            card.appendChild(document.createElement('p')).textContent = `Email: ${item.email}`;
                        } else {
                            card.appendChild(document.createElement('p')).textContent = `Venue: ${item.venue}`;
                            card.appendChild(document.createElement('p')).textContent = `Location: ${item.location}`;
                        }

                        content.appendChild(card);
                    });
                }

                details.appendChild(content);
                submissionsList.appendChild(details);
            });
        }

        async function loadSubmissions() {
            const params = new URLSearchParams(window.location.search);
            const password = params.get('password') || passwordInput.value;
            const response = await fetch(`/api/submissions?password=${encodeURIComponent(password)}`);
            if (!response.ok) {
                throw new Error('Unauthorized');
            }
            return response.json();
        }

        async function login() {
            const entered = passwordInput.value;
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: entered })
            });

            if (response.ok) {
                loginPanel.classList.add('hidden');
                submissionsPanel.classList.remove('hidden');
                loginError.style.display = 'none';
                const items = await loadSubmissions();
                renderSubmissions(items);
            } else {
                loginError.style.display = 'block';
            }
        }

        loginButton.addEventListener('click', login);
        passwordInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                login();
            }
        });

        clearButton.addEventListener('click', async () => {
            const password = passwordInput.value;
            const response = await fetch(`/api/submissions?password=${encodeURIComponent(password)}`, {
                method: 'DELETE'
            });
            if (response.ok) {
                renderSubmissions([]);
            } else {
                loginError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
