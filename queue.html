<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get in the queue for a sticker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="queue.html" class="logo-button" aria-label="Get in the queue for a sticker">
            <img src="logo.png" alt="Evan Wormhole Logo" class="logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="music.html">Music</a></li>
                <li><a href="shows.html">Shows</a></li>
                <li><a href="https://soundsilks.com/collections/evan-wormhole" target="_blank" rel="noopener noreferrer">Merch</a></li>
                <li><a href="updates.html">Updates</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero sticker-hero">
            <h2>Get in the queue for a sticker</h2>
            <p>Fancy a sticker from Evan Wormhole ? Submit your email below and we’ll reach out once we've got one for you :</p>
            <form>
                <label for="sticker-email">Email address</label>
                <input type="email" id="sticker-email" name="email" required placeholder="you@example.com">
                <button type="submit">Submit Email</button>
                <p id="submission-status" style="display:none; margin-top: 0.75rem;"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Evan Wormhole. All rights reserved.</p>
    </footer>

    <script>
        const stickerForm = document.querySelector('.sticker-hero form');
        const stickerEmailInput = document.getElementById('sticker-email');
        const submissionStatus = document.getElementById('submission-status');

        stickerForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const email = stickerEmailInput.value.trim();

            if (!email) {
                submissionStatus.textContent = 'Please enter a valid email address.';
                submissionStatus.style.display = 'block';
                return;
            }

            const submission = {
                type: 'sticker',
                email,
                timestamp: new Date().toISOString()
            };

            const stored = JSON.parse(localStorage.getItem('adminSubmissions') || '[]');
            stored.push(submission);
            localStorage.setItem('adminSubmissions', JSON.stringify(stored));

            stickerForm.reset();
            submissionStatus.textContent = 'Thanks! Your sticker queue submission has been saved.';
            submissionStatus.style.display = 'block';
        });
    </script>
</body>
</html>
